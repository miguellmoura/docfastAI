spring:
  application:
    name: docfast-api

  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Redis desabilitado temporariamente - habilitar quando tiver rodando
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

# App config
app:
  openai:
    api-key: ${OPENAI_API_KEY}
    default-model: gpt-4o-mini
    max-tokens: 1500
  
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
  
  upload:
    max-size-mb: 10
    allowed-mime-types:
      - application/pdf
  
  mercadopago:
    access-token: ${MERCADOPAGO_ACCESS_TOKEN}
    webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}
  
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}
      - image/jpeg
      - image/png
      - image/webp

logging:
  level:
    com.docfast: INFO
    org.springframework.web: INFO
